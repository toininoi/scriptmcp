name: Release ScriptMCP.Console

on:
  push:
    branches:
      - main
    paths:
      - "ScriptMCP.Console/**"
      - "ScriptMCP.Library/**"
      - ".github/workflows/release-console.yml"
  workflow_dispatch:
    inputs:
      custom_version:
        description: Optional explicit version number to release, for example 2.3.4
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute Version And Tag
        id: version
        shell: bash
        env:
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          set -euo pipefail

          if [[ -n "${CUSTOM_VERSION:-}" ]]; then
            if [[ ! "$CUSTOM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "custom_version must match MAJOR.MINOR.PATCH, for example 2.3.4" >&2
              exit 1
            fi

            custom_tag="scriptmcp-v${CUSTOM_VERSION}"
            existing_custom_tag_commit="$(git rev-list -n 1 "$custom_tag" 2>/dev/null || true)"
            if [[ -n "$existing_custom_tag_commit" && "$existing_custom_tag_commit" != "${GITHUB_SHA}" ]]; then
              echo "Tag $custom_tag already exists on commit $existing_custom_tag_commit and cannot be reused for ${GITHUB_SHA}." >&2
              exit 1
            fi

            echo "tag=$custom_tag" >> "$GITHUB_OUTPUT"
            echo "version=$CUSTOM_VERSION" >> "$GITHUB_OUTPUT"

            if [[ -z "$existing_custom_tag_commit" ]]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$custom_tag"
              git push origin "$custom_tag"
            fi

            exit 0
          fi

          # If this commit already has a scriptmcp-v* tag, reuse it.
          existing_tag="$(git tag --points-at HEAD | grep -E '^scriptmcp-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "$existing_tag" ]]; then
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "version=${existing_tag#scriptmcp-v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find latest scriptmcp-v* tag, default to 1.0.0 if none exists.
          latest_tag="$(git tag --list 'scriptmcp-v*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest_tag" ]]; then
            major=1
            minor=0
            patch=0
          else
            version="${latest_tag#scriptmcp-v}"
            IFS='.' read -r major minor patch <<< "$version"
          fi

          # Increment patch; roll over patch 0-9 into minor.
          patch=$((patch + 1))
          if [[ "$patch" -ge 10 ]]; then
            patch=0
            minor=$((minor + 1))
          fi

          next_version="${major}.${minor}.${patch}"
          next_tag="scriptmcp-v${next_version}"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$next_tag"
          git push origin "$next_tag"

  cleanup-old-release-state:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete Older Releases Tags And Attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ needs.version.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_OWNER_TYPE: ${{ github.event.repository.owner.type }}
        run: |
          set -euo pipefail

          case "$REPOSITORY_OWNER_TYPE" in
            Organization)
              attestation_base="orgs/$REPOSITORY_OWNER/attestations"
              ;;
            User)
              attestation_base="users/$REPOSITORY_OWNER/attestations"
              ;;
            *)
              echo "Unsupported repository owner type: $REPOSITORY_OWNER_TYPE" >&2
              exit 1
              ;;
          esac

          digests_file="$(mktemp)"
          tags_file="$(mktemp)"
          payload_file="$(mktemp)"
          trap 'rm -f "$digests_file" "$tags_file" "$payload_file"' EXIT

          collect_release_state() {
            local tag="$1"

            if gh release view "$tag" --repo "$REPOSITORY" >/dev/null 2>&1; then
              release_json="$(gh api "/repos/$REPOSITORY/releases/tags/$tag" 2>/dev/null || true)"
              if [[ -n "$release_json" ]]; then
                mapfile -t digests < <(
                  printf '%s' "$release_json" |
                    jq -r '.assets[]?.digest // empty' |
                    grep '^sha256:' |
                    sort -u
                )

                printf '%s\n' "${digests[@]}" >> "$digests_file"
              fi
            fi

            printf '%s\n' "$tag" >> "$tags_file"
          }

          mapfile -t old_tags < <(git tag --list 'scriptmcp-v*' | grep -vx "$CURRENT_TAG" || true)
          for tag in "${old_tags[@]}"; do
            [[ -n "$tag" ]] || continue
            collect_release_state "$tag"
          done

          if [[ -s "$digests_file" ]]; then
            jq -Rn '
              [inputs | select(length > 0)] | unique | {subject_digests: .}
            ' < "$digests_file" > "$payload_file"

            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/$attestation_base/delete-request" \
              --input "$payload_file"
          fi

          if [[ -s "$tags_file" ]]; then
            mapfile -t tags_to_delete < <(sort -u "$tags_file")
            for tag in "${tags_to_delete[@]}"; do
              [[ -n "$tag" ]] || continue
              gh release delete "$tag" --repo "$REPOSITORY" -y >/dev/null 2>&1 || true
              git push origin ":refs/tags/$tag" >/dev/null 2>&1 || true
              git tag -d "$tag" >/dev/null 2>&1 || true
            done
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: [version, cleanup-old-release-state]
    steps:
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ needs.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${{ needs.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "ScriptMCP ${{ needs.version.outputs.version }}" \
            --generate-notes

  publish:
    runs-on: ubuntu-latest
    needs: [version, create-release]
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, linux-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Keep this aligned with global.json and the net9.0 target frameworks.
          dotnet-version: "9.0.x"

      - name: Publish
        run: |
          FOLDER="ScriptMCP ${{ needs.version.outputs.version }}"

          dotnet publish ScriptMCP.Console/ScriptMCP.Console.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=false \
            -o "artifacts/$FOLDER"

          # Ensure executable permission on non-Windows (AssemblyName already produces 'scriptmcp')
          if [[ "${{ matrix.rid }}" != win-* ]]; then
            chmod +x "artifacts/$FOLDER/scriptmcp"
          fi

      - name: Package
        run: |
          cd artifacts
          zip -r scriptmcp-${{ matrix.rid }}.zip "ScriptMCP ${{ needs.version.outputs.version }}"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "artifacts/scriptmcp-${{ matrix.rid }}.zip"

      - name: Upload Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.version.outputs.tag }}" \
            "artifacts/scriptmcp-${{ matrix.rid }}.zip" \
            --repo "${{ github.repository }}" \
            --clobber
